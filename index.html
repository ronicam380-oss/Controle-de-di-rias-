<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Diárias - Controle Avançado</title>

<!-- CARREGAMENTO CORRETO E ORDENADO DAS BIBLIOTECAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: #e9f0f5;
    padding: 20px 16px;
    min-height: 100vh;
  }

  .container {
    max-width: 750px;
    margin: 0 auto;
    background: white;
    border-radius: 32px;
    padding: 20px 18px 28px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.08);
  }

  h2 {
    text-align: center;
    font-size: 1.8rem;
    color: #1e3c5c;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  input, button {
    padding: 12px 14px;
    border-radius: 40px;
    border: 1px solid #ccdbe5;
    font-size: 1rem;
    outline: none;
    transition: 0.2s;
  }

  input:focus {
    border-color: #2c7da0;
    box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
  }

  button {
    background: #eef2f5;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }
  button:active { transform: scale(0.97); }

  .btn-add { background: #1f7b4d; color: white; }
  .btn-del { background: #c23b2b; color: white; }
  .btn-summary { background: #6c4e2e; color: white; }
  .btn-pdf { background: #1f6392; color: white; }

  .preview {
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
    background: #e6f0f9;
    margin: 12px 0 16px;
    padding: 10px;
    border-radius: 60px;
    color: #0f4c5f;
  }

  .total-card {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 800;
    background: #d9e8f2;
    padding: 12px;
    border-radius: 48px;
    margin: 18px 0 20px;
    color: #0c2e42;
  }

  .button-group {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 8px 0 12px;
  }
  .button-group button { flex: 1; min-width: 110px; }

  .registro-item {
    display: grid;
    grid-template-columns: 90px 1fr 100px;
    align-items: center;
    gap: 8px;
    background: #ffffff;
    border: 1px solid #dee6ed;
    border-radius: 20px;
    padding: 12px 14px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.1s;
  }
  .registro-item:active { background: #f4f9fe; border-left: 5px solid #2c7da0; }
  .registro-item .data-badge {
    font-weight: 600;
    color: #1e5a7a;
    background: #eff4fa;
    border-radius: 40px;
    padding: 6px 8px;
    text-align: center;
    font-size: 0.85rem;
  }
  .registro-item .info-nome {
    font-weight: 500;
    color: #1f2f3a;
    word-break: break-word;
  }
  .registro-item small {
    color: #54809b;
    font-size: 0.7rem;
  }
  .valor-registro {
    font-weight: 800;
    font-size: 1rem;
    color: #1b6d3e;
    text-align: right;
    background: #edf7f0;
    padding: 5px 10px;
    border-radius: 30px;
    white-space: nowrap;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-content {
    background: white;
    width: 90%;
    max-width: 500px;
    max-height: 80%;
    border-radius: 24px;
    padding: 20px;
    overflow-y: auto;
  }
  .modal-content h3 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: #1e3c5c;
  }
  .close-modal {
    background: #c23b2b;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
  }
  .resumo-tabela {
    width: 100%;
    border-collapse: collapse;
  }
  .resumo-tabela th, .resumo-tabela td {
    border-bottom: 1px solid #ddd;
    padding: 10px 6px;
    text-align: left;
  }
  .resumo-total {
    background: #d9e8f2;
    padding: 10px;
    border-radius: 20px;
    text-align: center;
    margin-top: 20px;
    font-weight: bold;
  }

  @media (max-width: 520px) {
    .registro-item { grid-template-columns: 70px 1fr 85px; gap: 6px; padding: 10px; }
    .valor-registro { font-size: 0.85rem; white-space: normal; text-align: center; }
  }
</style>
</head>
<body>

<div class="container">
  <h2>📋 Controle de Diárias</h2>

  <div class="form-grid">
    <input type="date" id="data" value="">
    <input type="text" id="nome" placeholder="Nome completo" autocomplete="off">
    <input type="number" id="dias" placeholder="Dias" value="1" step="0.5" min="0.5">
    <input type="number" id="diaria" placeholder="R$/diária" value="70" step="1">
  </div>

  <div class="preview" id="preview">R$ 0,00</div>

  <div class="button-group">
    <button class="btn-add" onclick="salvarRegistro()">➕ Salvar</button>
    <button class="btn-del" onclick="excluirRegistro()">🗑️ Excluir</button>
    <button class="btn-summary" onclick="abrirResumoPessoas()">📊 Resumo por Pessoa</button>
    <button class="btn-pdf" onclick="gerarPDFTermico()">🖨️ Imprimir Térmica</button>
  </div>

  <div class="total-card" id="totalGeral">💰 TOTAL: R$ 0,00</div>
  <div id="listaRegistros"></div>
</div>

<!-- Modal Resumo -->
<div id="modalResumo" class="modal">
  <div class="modal-content">
    <h3>📊 Resumo por Pessoa (valores somados)
      <button class="close-modal" onclick="fecharModalResumo()">✕ Fechar</button>
    </h3>
    <div id="conteudoResumo"></div>
  </div>
</div>

<script>
  // ================== DADOS ==================
  let dados = JSON.parse(localStorage.getItem("dados") || "[]");
  let editIndex = null;

  const dataInput = document.getElementById("data");
  const nomeInput = document.getElementById("nome");
  const diasInput = document.getElementById("dias");
  const diariaInput = document.getElementById("diaria");
  const previewSpan = document.getElementById("preview");
  const totalSpan = document.getElementById("totalGeral");

  // Atualizar preview
  function atualizarPreview() {
    let diasVal = parseFloat(diasInput.value) || 0;
    let diariaVal = parseFloat(diariaInput.value) || 0;
    let valor = diasVal * diariaVal;
    previewSpan.innerText = "R$ " + valor.toFixed(2).replace('.', ',');
  }
  diasInput.addEventListener("input", atualizarPreview);
  diariaInput.addEventListener("input", atualizarPreview);

  function limparFormulario() {
    nomeInput.value = "";
    diasInput.value = "1";
    diariaInput.value = "70";
    if (!dataInput.value) {
      const hoje = new Date().toISOString().slice(0,10);
      dataInput.value = hoje;
    }
    editIndex = null;
    atualizarPreview();
  }

  function salvarRegistro() {
    let dataVal = dataInput.value.trim();
    let nomeVal = nomeInput.value.trim();
    let diasVal = parseFloat(diasInput.value);
    let diariaVal = parseFloat(diariaInput.value);

    if (!dataVal) { alert("❌ Informe a data."); return; }
    if (!nomeVal) { alert("❌ Informe o nome."); return; }
    if (isNaN(diasVal) || diasVal <= 0) { alert("❌ Dias deve ser maior que zero."); return; }
    if (isNaN(diariaVal) || diariaVal <= 0) { alert("❌ Valor da diária inválido."); return; }

    const novoItem = { data: dataVal, nome: nomeVal, dias: diasVal, diaria: diariaVal };
    if (editIndex !== null && editIndex >= 0 && editIndex < dados.length) {
      dados[editIndex] = novoItem;
      editIndex = null;
    } else {
      dados.push(novoItem);
    }
    localStorage.setItem("dados", JSON.stringify(dados));
    limparFormulario();
    renderizarLista();
  }

  function excluirRegistro() {
    if (editIndex === null) { alert("⚠️ Selecione um registro clicando sobre ele para excluir."); return; }
    if (editIndex >= 0 && editIndex < dados.length) {
      if (confirm(`Excluir diária de ${dados[editIndex].nome}?`)) {
        dados.splice(editIndex, 1);
        localStorage.setItem("dados", JSON.stringify(dados));
        limparFormulario();
        renderizarLista();
      }
    } else { editIndex = null; }
  }

  function renderizarLista() {
    const listaDiv = document.getElementById("listaRegistros");
    listaDiv.innerHTML = "";
    if (!dados.length) {
      listaDiv.innerHTML = '<div style="text-align:center; padding:24px; color:#7c8f9c; background:#f6fafd; border-radius:28px;">✨ Nenhum registro. Adicione diárias clicando em Salvar.</div>';
      totalSpan.innerText = "💰 TOTAL: R$ 0,00";
      return;
    }
    let somaGeral = 0;
    dados.forEach((item, idx) => {
      const subtotal = item.dias * item.diaria;
      somaGeral += subtotal;
      const card = document.createElement("div");
      card.className = "registro-item";
      const nomeCurto = item.nome.length > 22 ? item.nome.substring(0, 20) + "…" : item.nome;
      card.innerHTML = `
        <div class="data-badge">📅 ${item.data}</div>
        <div class="info-nome">👤 ${nomeCurto}<br><small>${item.dias} dia(s) × R$ ${item.diaria.toFixed(2).replace('.',',')}</small></div>
        <div class="valor-registro">R$ ${subtotal.toFixed(2).replace('.',',')}</div>
      `;
      card.addEventListener("click", () => {
        dataInput.value = item.data;
        nomeInput.value = item.nome;
        diasInput.value = item.dias;
        diariaInput.value = item.diaria;
        editIndex = idx;
        atualizarPreview();
        document.querySelector(".form-grid").scrollIntoView({ behavior: "smooth", block: "center" });
      });
      listaDiv.appendChild(card);
    });
    totalSpan.innerText = `💰 TOTAL: R$ ${somaGeral.toFixed(2).replace('.',',')}`;
  }

  // ========== RESUMO POR PESSOA (AGRUPADO) ==========
  function abrirResumoPessoas() {
    const modal = document.getElementById("modalResumo");
    const container = document.getElementById("conteudoResumo");
    if (!dados.length) {
      container.innerHTML = '<p style="text-align:center; padding:20px;">Nenhum registro cadastrado.</p>';
      modal.style.display = "flex";
      return;
    }
    const mapa = new Map();
    for (const item of dados) {
      const valorItem = item.dias * item.diaria;
      if (mapa.has(item.nome)) {
        const existente = mapa.get(item.nome);
        existente.totalDias += item.dias;
        existente.totalValor += valorItem;
      } else {
        mapa.set(item.nome, { totalDias: item.dias, totalValor: valorItem });
      }
    }
    const resumoArray = Array.from(mapa.entries()).map(([nome, info]) => ({ nome, totalDias: info.totalDias, totalValor: info.totalValor })).sort((a,b) => a.nome.localeCompare(b.nome));
    let somaGeralResumo = 0;
    let html = `<table class="resumo-tabela"><thead><tr><th>👤 Pessoa</th><th>📆 Total Dias</th><th>💰 Total (R$)</th></tr></thead><tbody>`;
    for (const r of resumoArray) {
      somaGeralResumo += r.totalValor;
      html += `<tr><td><strong>${escapeHtml(r.nome)}</strong></td><td style="text-align:center">${r.totalDias}</td><td style="text-align:right">R$ ${r.totalValor.toFixed(2).replace('.',',')}</td></tr>`;
    }
    html += `</tbody></table><div class="resumo-total">🏆 TOTAL GERAL: R$ ${somaGeralResumo.toFixed(2).replace('.',',')}</div>`;
    container.innerHTML = html;
    modal.style.display = "flex";
  }
  function fecharModalResumo() { document.getElementById("modalResumo").style.display = "none"; }
  window.onclick = function(event) { if (event.target === document.getElementById("modalResumo")) fecharModalResumo(); };
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  // ========== PDF TÉRMICO CORRIGIDO (SEM ERRO DE LENGTH) ==========
  function gerarPDFTermico() {
    if (!dados.length) {
      alert("Nenhum dado para imprimir. Adicione registros primeiro.");
      return;
    }

    // Garantir que jsPDF e o plugin autoTable estejam disponíveis
    if (typeof window.jspdf === 'undefined' || !window.jspdf.jsPDF) {
      alert("Biblioteca jsPDF não carregada. Recarregue a página e tente novamente.");
      return;
    }

    // Verificar se o plugin autoTable foi adicionado ao jsPDF
    const jsPDF = window.jspdf.jsPDF;
    let doc;
    try {
      doc = new jsPDF({ unit: 'mm', format: [80, 297], orientation: 'portrait' });
    } catch(e) {
      alert("Erro ao criar documento PDF: " + e.message);
      return;
    }

    // Verificar se o método autoTable existe (plugin carregado)
    if (typeof doc.autoTable !== 'function') {
      alert("Plugin autoTable não carregado. Tente recarregar a página com internet ativa.");
      return;
    }

    try {
      // Cabeçalho
      doc.setFont("helvetica", "normal");
      doc.setFontSize(12);
      doc.text("CONTROLE DE DIÁRIAS", 40, 12, { align: "center" });
      doc.setFontSize(7);
      doc.text(`Emissão: ${new Date().toLocaleString('pt-BR')}`, 40, 19, { align: "center" });
      doc.line(5, 23, 75, 23);

      // Preparar dados da tabela
      const corpoTabela = dados.map(item => {
        const subtotal = (item.dias * item.diaria).toFixed(2);
        return [
          item.data,
          item.nome.length > 20 ? item.nome.substring(0, 18) + ".." : item.nome,
          item.dias.toString(),
          `R$ ${item.diaria.toFixed(2)}`,
          `R$ ${subtotal}`
        ];
      });

      const totalGeralValor = dados.reduce((acc, cur) => acc + (cur.dias * cur.diaria), 0);

      // Gerar tabela
      doc.autoTable({
        startY: 28,
        head: [["DATA", "NOME", "D", "DIÁRIA", "TOTAL"]],
        body: corpoTabela,
        theme: "striped",
        styles: { fontSize: 7, cellPadding: 1.2, font: "helvetica", textColor: 0, lineColor: [120,120,120], lineWidth: 0.1, valign: 'middle' },
        headStyles: { fillColor: [230, 240, 248], textColor: 0, fontStyle: "bold", fontSize: 7.5, halign: "center" },
        columnStyles: { 0: { cellWidth: 16, halign: "center" }, 1: { cellWidth: 26, halign: "left" }, 2: { cellWidth: 7, halign: "center" }, 3: { cellWidth: 14, halign: "right" }, 4: { cellWidth: 15, halign: "right" } },
        margin: { left: 4, right: 4 }
      });

      let yFinal = doc.lastAutoTable.finalY + 3;
      if (yFinal > 280) yFinal = 270;
      doc.line(4, yFinal, 76, yFinal);
      doc.setFontSize(9);
      doc.setFont(undefined, "bold");
      doc.text(`TOTAL GERAL: R$ ${totalGeralValor.toFixed(2).replace('.',',')}`, 40, yFinal + 5, { align: "center" });

      // Resumo por pessoa dentro do PDF
      const mapaResumo = new Map();
      for (const item of dados) {
        const valor = item.dias * item.diaria;
        mapaResumo.set(item.nome, (mapaResumo.get(item.nome) || 0) + valor);
      }
      let yOffset = yFinal + 10;
      doc.setFontSize(7.5);
      doc.setFont(undefined, "normal");
      doc.text("--- RESUMO POR PESSOA ---", 40, yOffset, { align: "center" });
      yOffset += 4;
      doc.setFontSize(7);
      for (let [nome, totalPessoa] of mapaResumo.entries()) {
        if (yOffset > 275) break;
        const nomeLimpo = nome.length > 24 ? nome.substring(0, 22) + ".." : nome;
        doc.text(`${nomeLimpo}: R$ ${totalPessoa.toFixed(2).replace('.',',')}`, 6, yOffset);
        yOffset += 3.8;
      }
      yOffset += 3;
      doc.line(5, yOffset, 75, yOffset);
      doc.setFontSize(6.5);
      doc.setTextColor(90);
      doc.text("Sistema de Diárias - Comprovante Oficial", 40, yOffset + 5, { align: "center" });
      doc.text("Obrigado!", 40, yOffset + 10, { align: "center" });

      const dataArquivo = new Date().toISOString().slice(0,10);
      doc.save(`diarias_${dataArquivo}.pdf`);
    } catch (error) {
      console.error("Erro detalhado:", error);
      alert("Erro ao gerar PDF: " + error.message + "\nVerifique o console para mais detalhes.");
    }
  }

  // Inicialização
  window.addEventListener("DOMContentLoaded", () => {
    if (!dataInput.value) {
      const hoje = new Date().toISOString().slice(0,10);
      dataInput.value = hoje;
    }
    renderizarLista();
    atualizarPreview();
  });
</script>
</body>
</html>
