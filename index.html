<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Diárias - Controle TXT 56mm</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: #e9f0f5;
    padding: 20px 16px;
    min-height: 100vh;
  }

  .container {
    max-width: 750px;
    margin: 0 auto;
    background: white;
    border-radius: 32px;
    padding: 20px 18px 28px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.08);
  }

  h2 {
    text-align: center;
    font-size: 1.8rem;
    color: #1e3c5c;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  input, button {
    padding: 12px 14px;
    border-radius: 40px;
    border: 1px solid #ccdbe5;
    font-size: 1rem;
    outline: none;
    transition: 0.2s;
  }

  input:focus {
    border-color: #2c7da0;
    box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
  }

  button {
    background: #eef2f5;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }
  button:active { transform: scale(0.97); }

  .btn-add { background: #1f7b4d; color: white; }
  .btn-del { background: #c23b2b; color: white; }
  .btn-summary { background: #6c4e2e; color: white; }
  .btn-txt { background: #2c5f2d; color: white; }

  .preview {
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
    background: #e6f0f9;
    margin: 12px 0 16px;
    padding: 10px;
    border-radius: 60px;
    color: #0f4c5f;
  }

  .total-card {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 800;
    background: #d9e8f2;
    padding: 12px;
    border-radius: 48px;
    margin: 18px 0 20px;
    color: #0c2e42;
  }

  .button-group {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 8px 0 12px;
  }
  .button-group button { flex: 1; min-width: 100px; }

  .registro-item {
    display: grid;
    grid-template-columns: 90px 1fr 100px;
    align-items: center;
    gap: 8px;
    background: #ffffff;
    border: 1px solid #dee6ed;
    border-radius: 20px;
    padding: 12px 14px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.1s;
  }
  .registro-item:active { background: #f4f9fe; border-left: 5px solid #2c7da0; }
  .registro-item .data-badge {
    font-weight: 600;
    color: #1e5a7a;
    background: #eff4fa;
    border-radius: 40px;
    padding: 6px 8px;
    text-align: center;
    font-size: 0.85rem;
  }
  .registro-item .info-nome {
    font-weight: 500;
    color: #1f2f3a;
    word-break: break-word;
  }
  .registro-item small {
    color: #54809b;
    font-size: 0.7rem;
  }
  .valor-registro {
    font-weight: 800;
    font-size: 1rem;
    color: #1b6d3e;
    text-align: right;
    background: #edf7f0;
    padding: 5px 10px;
    border-radius: 30px;
    white-space: nowrap;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-content {
    background: white;
    width: 90%;
    max-width: 500px;
    max-height: 80%;
    border-radius: 24px;
    padding: 20px;
    overflow-y: auto;
  }
  .modal-content h3 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: #1e3c5c;
  }
  .close-modal {
    background: #c23b2b;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
  }
  .resumo-tabela {
    width: 100%;
    border-collapse: collapse;
  }
  .resumo-tabela th, .resumo-tabela td {
    border-bottom: 1px solid #ddd;
    padding: 10px 6px;
    text-align: left;
  }
  .resumo-total {
    background: #d9e8f2;
    padding: 10px;
    border-radius: 20px;
    text-align: center;
    margin-top: 20px;
    font-weight: bold;
  }

  @media (max-width: 520px) {
    .registro-item { grid-template-columns: 70px 1fr 85px; gap: 6px; padding: 10px; }
    .valor-registro { font-size: 0.85rem; white-space: normal; text-align: center; }
    .button-group button { min-width: 80px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="container">
  <h2>📋 Controle de Diárias</h2>

  <div class="form-grid">
    <input type="date" id="data" value="">
    <input type="text" id="nome" placeholder="Nome completo" autocomplete="off">
    <input type="number" id="dias" placeholder="Dias" value="1" step="0.5" min="0.5">
    <input type="number" id="diaria" placeholder="R$/diária" value="70" step="1">
  </div>

  <div class="preview" id="preview">R$ 0,00</div>

  <div class="button-group">
    <button class="btn-add" onclick="salvarRegistro()">➕ Salvar</button>
    <button class="btn-del" onclick="excluirRegistro()">🗑️ Excluir</button>
    <button class="btn-summary" onclick="abrirResumoPessoas()">📊 Resumo</button>
    <button class="btn-txt" onclick="gerarTXT_56mm()">🖨️ Imprimir TXT 56mm</button>
  </div>

  <div class="total-card" id="totalGeral">💰 TOTAL: R$ 0,00</div>
  <div id="listaRegistros"></div>
</div>

<!-- Modal Resumo -->
<div id="modalResumo" class="modal">
  <div class="modal-content">
    <h3>📊 Resumo por Pessoa (valores somados)
      <button class="close-modal" onclick="fecharModalResumo()">✕ Fechar</button>
    </h3>
    <div id="conteudoResumo"></div>
  </div>
</div>

<script>
  // ================== DADOS ==================
  let dados = JSON.parse(localStorage.getItem("dados") || "[]");
  let editIndex = null;

  const dataInput = document.getElementById("data");
  const nomeInput = document.getElementById("nome");
  const diasInput = document.getElementById("dias");
  const diariaInput = document.getElementById("diaria");
  const previewSpan = document.getElementById("preview");
  const totalSpan = document.getElementById("totalGeral");

  // Atualizar preview
  function atualizarPreview() {
    let diasVal = parseFloat(diasInput.value) || 0;
    let diariaVal = parseFloat(diariaInput.value) || 0;
    let valor = diasVal * diariaVal;
    previewSpan.innerText = "R$ " + valor.toFixed(2).replace('.', ',');
  }
  diasInput.addEventListener("input", atualizarPreview);
  diariaInput.addEventListener("input", atualizarPreview);

  function limparFormulario() {
    nomeInput.value = "";
    diasInput.value = "1";
    diariaInput.value = "70";
    if (!dataInput.value) {
      const hoje = new Date().toISOString().slice(0,10);
      dataInput.value = hoje;
    }
    editIndex = null;
    atualizarPreview();
  }

  function salvarRegistro() {
    let dataVal = dataInput.value.trim();
    let nomeVal = nomeInput.value.trim();
    let diasVal = parseFloat(diasInput.value);
    let diariaVal = parseFloat(diariaInput.value);

    if (!dataVal) { alert("❌ Informe a data."); return; }
    if (!nomeVal) { alert("❌ Informe o nome."); return; }
    if (isNaN(diasVal) || diasVal <= 0) { alert("❌ Dias deve ser maior que zero."); return; }
    if (isNaN(diariaVal) || diariaVal <= 0) { alert("❌ Valor da diária inválido."); return; }

    const novoItem = { data: dataVal, nome: nomeVal, dias: diasVal, diaria: diariaVal };
    if (editIndex !== null && editIndex >= 0 && editIndex < dados.length) {
      dados[editIndex] = novoItem;
      editIndex = null;
    } else {
      dados.push(novoItem);
    }
    localStorage.setItem("dados", JSON.stringify(dados));
    limparFormulario();
    renderizarLista();
  }

  function excluirRegistro() {
    if (editIndex === null) { alert("⚠️ Selecione um registro clicando sobre ele para excluir."); return; }
    if (editIndex >= 0 && editIndex < dados.length) {
      if (confirm(`Excluir diária de ${dados[editIndex].nome}?`)) {
        dados.splice(editIndex, 1);
        localStorage.setItem("dados", JSON.stringify(dados));
        limparFormulario();
        renderizarLista();
      }
    } else { editIndex = null; }
  }

  function renderizarLista() {
    const listaDiv = document.getElementById("listaRegistros");
    listaDiv.innerHTML = "";
    if (!dados.length) {
      listaDiv.innerHTML = '<div style="text-align:center; padding:24px; color:#7c8f9c; background:#f6fafd; border-radius:28px;">✨ Nenhum registro. Adicione diárias clicando em Salvar.</div>';
      totalSpan.innerText = "💰 TOTAL: R$ 0,00";
      return;
    }
    let somaGeral = 0;
    dados.forEach((item, idx) => {
      const subtotal = item.dias * item.diaria;
      somaGeral += subtotal;
      const card = document.createElement("div");
      card.className = "registro-item";
      const nomeCurto = item.nome.length > 22 ? item.nome.substring(0, 20) + "…" : item.nome;
      card.innerHTML = `
        <div class="data-badge">📅 ${item.data}</div>
        <div class="info-nome">👤 ${nomeCurto}<br><small>${item.dias} dia(s) × R$ ${item.diaria.toFixed(2).replace('.',',')}</small></div>
        <div class="valor-registro">R$ ${subtotal.toFixed(2).replace('.',',')}</div>
      `;
      card.addEventListener("click", () => {
        dataInput.value = item.data;
        nomeInput.value = item.nome;
        diasInput.value = item.dias;
        diariaInput.value = item.diaria;
        editIndex = idx;
        atualizarPreview();
        document.querySelector(".form-grid").scrollIntoView({ behavior: "smooth", block: "center" });
      });
      listaDiv.appendChild(card);
    });
    totalSpan.innerText = `💰 TOTAL: R$ ${somaGeral.toFixed(2).replace('.',',')}`;
  }

  // ========== RESUMO POR PESSOA (AGRUPADO) ==========
  function abrirResumoPessoas() {
    const modal = document.getElementById("modalResumo");
    const container = document.getElementById("conteudoResumo");
    if (!dados.length) {
      container.innerHTML = '<p style="text-align:center; padding:20px;">Nenhum registro cadastrado.</p>';
      modal.style.display = "flex";
      return;
    }
    const mapa = new Map();
    for (const item of dados) {
      const valorItem = item.dias * item.diaria;
      if (mapa.has(item.nome)) {
        const existente = mapa.get(item.nome);
        existente.totalDias += item.dias;
        existente.totalValor += valorItem;
      } else {
        mapa.set(item.nome, { totalDias: item.dias, totalValor: valorItem });
      }
    }
    const resumoArray = Array.from(mapa.entries()).map(([nome, info]) => ({ nome, totalDias: info.totalDias, totalValor: info.totalValor })).sort((a,b) => a.nome.localeCompare(b.nome));
    let somaGeralResumo = 0;
    let html = `<table class="resumo-tabela"><thead><tr><th>👤 Pessoa</th><th>📆 Total Dias</th><th>💰 Total (R$)</th></tr></thead><tbody>`;
    for (const r of resumoArray) {
      somaGeralResumo += r.totalValor;
      html += `<tr><td><strong>${escapeHtml(r.nome)}</strong></td><td style="text-align:center">${r.totalDias}</td><td style="text-align:right">R$ ${r.totalValor.toFixed(2).replace('.',',')}</td></tr>`;
    }
    html += `</tbody></table><div class="resumo-total">🏆 TOTAL GERAL: R$ ${somaGeralResumo.toFixed(2).replace('.',',')}</div>`;
    container.innerHTML = html;
    modal.style.display = "flex";
  }
  function fecharModalResumo() { document.getElementById("modalResumo").style.display = "none"; }
  window.onclick = function(event) { if (event.target === document.getElementById("modalResumo")) fecharModalResumo(); };
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  // ========== GERAR TXT FORMATADO PARA IMPRESSORA TÉRMICA 56mm ==========
  // Função que centraliza texto para largura de 32 caracteres (56mm coube ~32-34 chars)
  function centralizar(texto, larguraMax = 32) {
    const espacos = Math.max(0, (larguraMax - texto.length) / 2);
    return ' '.repeat(Math.floor(espacos)) + texto;
  }

  function linhaSimples(largura = 32, char = '-') {
    return char.repeat(largura);
  }

  function linhaDupla(largura = 32) {
    return '='.repeat(largura);
  }

  function ajustarTexto(texto, larguraMax = 32) {
    if (texto.length <= larguraMax) return texto;
    return texto.substring(0, larguraMax - 3) + '...';
  }

  function gerarTXT_56mm() {
    if (!dados.length) {
      alert("Nenhum dado para imprimir. Adicione registros primeiro.");
      return;
    }

    const larguraLinha = 32; // 32 caracteres é o ideal para papel 56mm (fonte monospace)
    let linhas = [];

    // Cabeçalho
    linhas.push(linhaDupla(larguraLinha));
    linhas.push(centralizar("DIÁRIAS", larguraLinha));
    linhas.push(centralizar(new Date().toLocaleString('pt-BR'), larguraLinha));
    linhas.push(linhaDupla(larguraLinha));
    linhas.push("");

    // Listagem detalhada
    linhas.push(centralizar("REGISTROS", larguraLinha));
    linhas.push(linhaSimples(larguraLinha, '-'));
    
    let totalGeral = 0;
    
    for (let i = 0; i < dados.length; i++) {
      const item = dados[i];
      const subtotal = item.dias * item.diaria;
      totalGeral += subtotal;
      
      // Formato compacto para 56mm
      const num = (i+1).toString().padStart(2);
      const dataLimpa = item.data.slice(5); // MM-DD
      const nomeCurto = ajustarTexto(item.nome, 14);
      const valorFormatado = `R$${subtotal.toFixed(2).replace('.',',')}`;
      
      // Linha 1: número, data, nome
      let linha1 = `${num} ${dataLimpa} ${nomeCurto}`;
      if (linha1.length > larguraLinha - 8) {
        linha1 = ajustarTexto(linha1, larguraLinha - 8);
      }
      // Alinha à esquerda e depois coloca o valor à direita
      const espacosRestantes = Math.max(1, larguraLinha - linha1.length - valorFormatado.length);
      linhas.push(linha1 + ' '.repeat(espacosRestantes) + valorFormatado);
      
      // Linha 2: dias e diária
      const infoLinha = `${item.dias} dia(s) x R$${item.diaria.toFixed(2).replace('.',',')}`;
      linhas.push('  ' + ajustarTexto(infoLinha, larguraLinha - 2));
      if (i < dados.length - 1) linhas.push(linhaSimples(larguraLinha, '.'));
    }
    
    linhas.push("");
    linhas.push(linhaDupla(larguraLinha));
    linhas.push(centralizar(`TOTAL: R$ ${totalGeral.toFixed(2).replace('.',',')}`, larguraLinha));
    linhas.push(linhaDupla(larguraLinha));
    linhas.push("");
    
    // Resumo por pessoa
    linhas.push(centralizar("RESUMO POR PESSOA", larguraLinha));
    linhas.push(linhaSimples(larguraLinha, '-'));
    
    const mapaResumo = new Map();
    for (const item of dados) {
      const valorItem = item.dias * item.diaria;
      mapaResumo.set(item.nome, (mapaResumo.get(item.nome) || 0) + valorItem);
    }
    
    const resumoOrdenado = Array.from(mapaResumo.entries()).sort((a,b) => a[0].localeCompare(b[0]));
    for (const [nomePessoa, totalPessoa] of resumoOrdenado) {
      const nomeAjustado = ajustarTexto(nomePessoa, 18);
      const valorTxt = `R$${totalPessoa.toFixed(2).replace('.',',')}`;
      const espacos = Math.max(1, larguraLinha - nomeAjustado.length - valorTxt.length);
      linhas.push(nomeAjustado + ' '.repeat(espacos) + valorTxt);
    }
    
    linhas.push("");
    linhas.push(linhaSimples(larguraLinha, '-'));
    linhas.push(centralizar(`TOTAL: R$ ${totalGeral.toFixed(2).replace('.',',')}`, larguraLinha));
    linhas.push(linhaDupla(larguraLinha));
    
    // Rodapé
    linhas.push(centralizar("*** DOCUMENTO OFICIAL ***", larguraLinha));
    linhas.push(centralizar("Sistema de Diárias", larguraLinha));
    linhas.push(centralizar("Impressão térmica 56mm", larguraLinha));
    linhas.push(linhaSimples(larguraLinha, '~'));
    
    // Montar o conteúdo do arquivo
    const conteudo = linhas.join('\n');
    
    // Criar e baixar o arquivo .txt
    const blob = new Blob([conteudo], { type: "text/plain;charset=utf-8" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    const dataAtual = new Date().toISOString().slice(0,10);
    link.download = `diarias_56mm_${dataAtual}.txt`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    
    alert("✅ Arquivo TXT gerado! Formato otimizado para impressora térmica 56mm.");
  }

  // Inicialização
  window.addEventListener("DOMContentLoaded", () => {
    if (!dataInput.value) {
      const hoje = new Date().toISOString().slice(0,10);
      dataInput.value = hoje;
    }
    renderizarLista();
    atualizarPreview();
  });
</script>
</body>
</html>
